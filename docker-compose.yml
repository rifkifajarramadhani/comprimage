services:
  # Local development: hot-reloading Vite dev server. `docker compose --profile dev up`.
  web-dev:
    profiles: [dev]
    build:
      context: .
      target: development
    command: bun run dev --host 0.0.0.0
    ports:
      - '${FRONTEND_DEV_PORT:-3000}:3000'
    volumes:
      # Bind-mount the source for HMR; keep the image's installed deps by masking
      # node_modules with a named volume (so the host checkout doesn't shadow it).
      - ./:/app
      - comprimage_node_modules:/app/node_modules

  # Production: static SPA served by nginx behind the shared Traefik edge proxy.
  web-prod:
    profiles: [prod]
    image: ghcr.io/rifkifajarramadhani/comprimage:${IMAGE_TAG:-latest}
    build:
      context: .
      target: production
    expose:
      - '80'
    networks:
      # Public edge network: the shared Traefik proxy routes external traffic here.
      - edge
    labels:
      - traefik.enable=true
      - traefik.docker.network=edge
      - 'traefik.http.routers.comprimage.rule=Host(`comprimage.rifkiramadhani.my.id`)'
      - traefik.http.routers.comprimage.entrypoints=websecure
      - traefik.http.routers.comprimage.tls=true
      - traefik.http.routers.comprimage.tls.certresolver=letsencrypt
      - traefik.http.services.comprimage.loadbalancer.server.port=80
      # Per-IP edge rate limit: 100 req/s average, burst 200
      - traefik.http.middlewares.comprimage-ratelimit.ratelimit.average=100
      - traefik.http.middlewares.comprimage-ratelimit.ratelimit.burst=200
      - traefik.http.routers.comprimage.middlewares=comprimage-ratelimit
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1/healthz']
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 5
    restart: unless-stopped

volumes:
  comprimage_node_modules:

networks:
  edge:
    name: edge
    external: true
