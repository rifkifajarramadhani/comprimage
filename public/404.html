<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, follow" />
    <meta name="theme-color" content="#ffffff" />
    <title>Page not found | Comprimage</title>
    <meta
      name="description"
      content="That URL does not match a page on Comprimage."
    />
    <link rel="icon" href="/comprimage-mark.svg" type="image/svg+xml" />
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        background: #ffffff;
        color: #202235;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
      }
      main {
        width: min(100%, 560px);
        text-align: center;
      }
      img {
        width: 64px;
        height: 64px;
      }
      h1 {
        margin: 24px 0 0;
        font-size: clamp(2rem, 6vw, 2.5rem);
        line-height: 1.1;
      }
      p {
        margin: 16px auto 0;
        max-width: 48ch;
        color: #5b5d70;
        line-height: 1.65;
      }
      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        margin-top: 32px;
        border-radius: 8px;
        padding: 0 20px;
        background: #585ff5;
        color: #ffffff;
        font-weight: 650;
        text-decoration: none;
      }
      a:focus-visible {
        outline: 3px solid #858aff;
        outline-offset: 3px;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          background: #151722;
          color: #f2f3f8;
        }
        p {
          color: #b7b9c8;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/comprimage-mark.svg" alt="" width="64" height="64" />
      <h1>Page not found</h1>
      <p>
        That URL doesn’t match anything here. Check the address or head back to
        the image toolkit.
      </p>
      <a href="/">Back to Comprimage</a>
    </main>
  </body>
</html>
