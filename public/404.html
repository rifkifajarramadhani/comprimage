<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, follow" />
    <meta
      name="theme-color"
      content="#fdfcfc"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#171514"
      media="(prefers-color-scheme: dark)"
    />
    <title>Page not found | Comprimage</title>
    <meta
      name="description"
      content="That URL does not match a page on Comprimage."
    />
    <link
      rel="icon"
      href="/comprimage-mark.svg"
      type="image/svg+xml"
      sizes="any"
    />
    <link
      rel="icon"
      href="/favicon.ico"
      type="image/x-icon"
      sizes="16x16 32x32 48x48 64x64"
    />
    <link
      rel="apple-touch-icon"
      href="/apple-touch-icon.png"
      type="image/png"
      sizes="180x180"
    />
    <link rel="manifest" href="/site.webmanifest" />
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco,
          Consolas, monospace;
        background: #fdfcfc;
        color: #201d1d;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
      }
      main {
        width: min(100%, 560px);
        text-align: center;
      }
      img {
        width: 64px;
        height: 64px;
      }
      h1 {
        margin: 24px 0 0;
        font-size: clamp(2rem, 6vw, 2.5rem);
        line-height: 1.1;
      }
      p {
        margin: 16px auto 0;
        max-width: 48ch;
        color: #646262;
        line-height: 1.65;
      }
      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        margin-top: 32px;
        border: 1px solid #3f9465;
        border-radius: 4px;
        padding: 0 20px;
        background: #3f9465;
        color: #fdfcfc;
        font-weight: 650;
        text-decoration: none;
      }
      a:focus-visible {
        outline: 3px solid #3f9465;
        outline-offset: 3px;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          background: #171514;
          color: #fdfcfc;
        }
        p {
          color: #9a9898;
        }
        a {
          border-color: #72d49a;
          background: #72d49a;
          color: #171514;
        }
        a:focus-visible {
          outline-color: #72d49a;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/comprimage-mark.svg" alt="" width="64" height="64" />
      <h1>Page not found</h1>
      <p>
        That URL doesn’t match anything here. Check the address or head back to
        the image toolkit.
      </p>
      <a href="/">Back to Comprimage</a>
    </main>
  </body>
</html>
