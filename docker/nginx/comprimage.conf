# Static serving for the comprimage SPA (TanStack Start, spa/static mode).
# All image processing is client-side; there is no backend to proxy to.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index _shell.html;

    # Compress text assets; hashed JS/CSS dominate the payload.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/manifest+json;

    # Lightweight healthcheck target (used by the compose healthcheck).
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # Service worker must never be cached, so a new deploy is picked up.
    # Service-Worker-Allowed lets it control the whole origin from the root scope.
    location = /sw.js {
        add_header Cache-Control "no-cache";
        add_header Service-Worker-Allowed "/";
    }
    location = /sw-message.js {
        add_header Cache-Control "no-cache";
    }
    location = /manifest.json {
        add_header Cache-Control "no-cache";
    }

    # Content-hashed build assets are safe to cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: unknown client-routed paths return the prerendered shell
    # (matches navigateFallback '/_shell.html' in scripts/generate-sw.mjs).
    location / {
        try_files $uri $uri/ /_shell.html;
    }
}
