# Static serving for Comprimage's prerendered TanStack Start routes.
# All image processing is client-side; there is no backend to proxy to.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    absolute_redirect off;

    # Compress text assets; hashed JS/CSS dominate the payload.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml;

    # Lightweight healthcheck target (used by the compose healthcheck).
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # Stable branding URLs must revalidate on every use — they are not
    # content-hashed.
    location ~ ^/(favicon\.ico|apple-touch-icon\.png|comprimage-mark\.svg)$ {
        add_header Cache-Control "no-cache, must-revalidate";
        error_page 404 /404.txt;
        try_files $uri =404;
    }

    location = /site.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "no-cache, must-revalidate";
        error_page 404 /404.txt;
        try_files $uri =404;
    }

    # Content-hashed build assets are safe to cache aggressively.
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        error_page 404 /404.txt;
        try_files $uri =404;
    }

    # Keep canonical route URLs extensionless and without trailing slashes.
    location ~ ^/(resize|compress|convert|batch|about|settings)/$ {
        return 308 /$1;
    }

    location ~ ^/(resize|compress|convert|batch|about|settings)$ {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files /$1/index.html =404;
    }

    location = / {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files /index.html =404;
    }

    # Direct HTML requests also revalidate; route documents are not hashed.
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
        error_page 404 /404.html;
        try_files $uri =404;
    }

    # Missing static resources return a plain 404, never an HTML app shell.
    location ~* \.(?:avif|css|gif|ico|jpe?g|js|json|map|png|svg|wasm|webp|woff2?)$ {
        error_page 404 /404.txt;
        try_files $uri =404;
    }

    location = /404.txt {
        internal;
        default_type text/plain;
    }

    location = /404.html {
        internal;
    }

    # Unknown documents return a genuine 404 with a branded static body.
    location / {
        error_page 404 /404.html;
        try_files $uri =404;
    }
}
